[package]
name = "tokio-knx-connector-demo"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "AimDB example demonstrating KNX connector integration with Tokio runtime"
publish = false

[features]
default = ["tokio-runtime", "tracing"]
tokio-runtime = ["aimdb-knx-connector/tokio-runtime"]
tracing = ["dep:tracing", "dep:tracing-subscriber"]

[dependencies]
# Core AimDB dependencies
aimdb-core = { path = "../../aimdb-core", features = ["std", "derive"] }
aimdb-tokio-adapter = { path = "../../aimdb-tokio-adapter", features = [
    "tokio-runtime",
    "tracing",
] }

# Shared demo types and monitors
knx-connector-demo-common = { path = "../knx-connector-demo-common", features = [
    "std",
    "derive",
] }

# KNX connector
aimdb-knx-connector = { path = "../../aimdb-knx-connector", features = [
    "tokio-runtime",
    "tracing",
] }

# UDS remote-access server — exposes this db to the `aimdb` CLI and aimdb-mcp
# over a Unix-domain socket (`unix:///tmp/aimdb-knx.sock`).
aimdb-uds-connector = { path = "../../aimdb-uds-connector" }

# Tokio runtime
tokio = { workspace = true, features = ["full"] }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Optional tracing
tracing = { workspace = true, optional = true }
tracing-subscriber = { version = "0.3", optional = true }
