[package]
name = "weather-station-gamma"
version = "0.1.0"
edition = "2021"
description = "Gamma weather station - MCU node (Embassy on STM32H563ZI)"
license = "MIT OR Apache-2.0"
publish = false

[features]
default = ["embassy-runtime"]
embassy-runtime = []
# `sim` is opt-in and dev-only (design 041 §3.1.4): "develop against sim, flash
# against silicon". It pulls the `Simulatable` impls + `rand` and wires
# `.simulate()`; the default (flash) build reads a hardware source and has no
# `rand` in its graph.
sim = [
    "weather-mesh-common/simulatable",
    "aimdb-data-contracts/simulatable",
    "dep:rand",
]
# Declare but don't enable these features to silence cfg warnings
tokio-runtime = []
std = []

[dependencies]
# AimDB dependencies
weather-mesh-common = { path = "../weather-mesh-common", default-features = false }
aimdb-core = { path = "../../../aimdb-core", default-features = false, features = [
    "alloc",
] }
aimdb-embassy-adapter = { path = "../../../aimdb-embassy-adapter", default-features = false, features = [
    "alloc",
    "embassy-runtime",
] }
aimdb-data-contracts = { path = "../../../aimdb-data-contracts", default-features = false }
aimdb-mqtt-connector = { path = "../../../aimdb-mqtt-connector", default-features = false, features = [
    "embassy-runtime",
] }

# Embassy ecosystem - STM32H563ZI with Ethernet (same as embassy-mqtt-connector-demo)
embassy-stm32 = { workspace = true, features = [
    "defmt",
    "stm32h563zi",
    "memory-x",
    "time-driver-any",
    "exti",
    "unstable-pac",
] }
embassy-sync = { workspace = true, features = ["defmt"] }
embassy-executor = { workspace = true, features = [
    "platform-cortex-m",
    "executor-thread",
    "defmt",
] }
embassy-time = { workspace = true, features = [
    "defmt",
    "defmt-timestamp-uptime",
    "tick-hz-32_768",
    "generic-queue-16",
] }
embassy-net = { workspace = true, features = [
    "defmt",
    "tcp",
    "dhcpv4",
    "medium-ethernet",
    "proto-ipv6",
] }
embassy-futures = { workspace = true }

# Embedded debugging and logging
defmt = { workspace = true }
defmt-rtt = { workspace = true }
panic-probe = { workspace = true }

# Cortex-M runtime
cortex-m = { workspace = true }
cortex-m-rt = { workspace = true }
critical-section = { workspace = true }
static_cell = { workspace = true }

# Embedded HAL
embedded-hal = { workspace = true }
embedded-hal-async = { workspace = true }
embedded-io-async = { workspace = true }
embedded-storage = { workspace = true }

# Embedded utilities
heapless = { workspace = true }
micromath = { workspace = true }
stm32-fmc = { workspace = true }
embedded-alloc = { version = "0.6", features = ["llff"] }

# Random number generation for simulation — only in the `sim` build. The
# network-stack seed uses the STM32 HAL RNG (embassy_stm32), not this crate.
rand = { version = "0.10.1", default-features = false, optional = true }


[package.metadata.embassy]
build = [
    { target = "thumbv8m.main-none-eabihf", artifact-dir = "out/examples/weather-station-gamma" },
]
