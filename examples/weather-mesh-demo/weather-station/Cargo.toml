[package]
name = "weather-station"
version = "0.1.0"
edition = "2021"
description = "Generic cloud weather station - joins the public mesh from a station.toml profile"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "weather-station"
path = "src/main.rs"

[dependencies]
weather-mesh-common = { path = "../weather-mesh-common", features = [
    "linkable",
    "migratable",
] }
aimdb-core = { path = "../../../aimdb-core" }
aimdb-tokio-adapter = { path = "../../../aimdb-tokio-adapter" }
aimdb-data-contracts = { path = "../../../aimdb-data-contracts", features = [
    "linkable",
    "migratable",
] }
aimdb-mqtt-connector = { path = "../../../aimdb-mqtt-connector", features = [
    "tokio-runtime",
] }

tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
toml = "0.8"
# Pre-flight CONNECT probe only (revoked-credential UX, design 042 §9); the
# data path goes through aimdb-mqtt-connector. Same feature set as the
# connector's own rumqttc.
rumqttc = { version = "0.25", default-features = false, features = [
    "use-native-tls",
] }
