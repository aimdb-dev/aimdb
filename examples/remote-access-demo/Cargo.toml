[package]
name = "remote-access-demo"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[[bin]]
name = "server"
path = "src/server.rs"

[[bin]]
name = "client"
path = "src/client.rs"

[dependencies]
aimdb-core = { path = "../../aimdb-core", features = [
    "std",
    "tracing",
    "profiling",
    "metrics",
] }
aimdb-tokio-adapter = { path = "../../aimdb-tokio-adapter", features = [
    "tokio-runtime",
    "tracing",
    "profiling",
    "metrics",
] }
aimdb-client = { path = "../../aimdb-client" }
aimdb-uds-connector = { path = "../../aimdb-uds-connector" }
tokio = { version = "1.48", features = ["full"] }
futures = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
