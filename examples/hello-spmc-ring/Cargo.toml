description = "AimDB minimal sync example demonstrating SPMC ring buffer semantics"
publish = false

[dependencies]
aimdb-core = { path = "../../aimdb-core", features = ["std"] }
aimdb-tokio-adapter = { path = "../../aimdb-tokio-adapter", features = [
    "tokio-runtime",
] }
aimdb-sync = { path = "../../aimdb-sync" }