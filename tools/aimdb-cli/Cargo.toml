[package]
name = "aimdb-cli"
version = "0.6.0"
edition = "2021"
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Command-line interface for AimDB - development and administration tool"
keywords = ["cli", "tool", "admin", "database", "debugging"]
categories = ["command-line-utilities", "database"]

[[bin]]
name = "aimdb"
path = "src/main.rs"

[dependencies]
# AimDB client library
aimdb-client = { version = "0.6.0", path = "../../aimdb-client" }
aimdb-codegen = { version = "0.2.0", path = "../../aimdb-codegen" }

# Core dependencies - reuse protocol types from aimdb-core.
# `observability` keeps the optional RecordMetadata fields (signal_stats,
# stage_profiling, buffer metrics) in the client-side struct — without it
# serde silently drops them from `record list --format json` output.
aimdb-core = { version = "1.1.0", path = "../../aimdb-core", features = [
    "std",
    "observability",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"

# CLI framework
clap = { version = "4", features = ["derive", "cargo"] }

# Async runtime (must match AimDB runtime)
tokio = { version = "1", features = [
    "net",
    "io-util",
    "rt-multi-thread",
    "signal",
    "macros",
    "time",
    "fs",
] }

# Error handling
anyhow = "1"
thiserror = "1"

# Output formatting
tabled = "0.20"
colored = "3"
chrono = "0.4"

# Optional: YAML output
serde_yaml = { version = "0.9", optional = true }

# `join` only (design 043): HTTP client for the provisioning endpoint + the
# GitHub device flow, and TOML for the station profile. rustls so released
# binaries don't depend on a system OpenSSL.
reqwest = { version = "0.12", default-features = false, features = [
    "rustls-tls",
    "json",
], optional = true }
toml = { version = "0.8", optional = true }

[features]
default = ["join"]
yaml = ["serde_yaml"]
# `aimdb join <provisioning-url>` — admit this machine to a deployment
# (design 043). On by default in released binaries.
join = ["dep:reqwest", "dep:toml"]
# Add the serial transport to the endpoint resolver, so `--connect serial://…`
# works. Off by default (pulls tokio-serial → libudev on Linux).
transport-serial = ["aimdb-client/transport-serial"]
# Add the TCP transport to the endpoint resolver, so `--connect tcp://HOST:PORT`
# works.
transport-tcp = ["aimdb-client/transport-tcp"]

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
